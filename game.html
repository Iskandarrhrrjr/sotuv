<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Ilon O'yini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', sans-serif;
        }
        h1 {
            color: #00ff88;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff88;
        }
        .score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }
        .score {
            color: white;
            font-size: 1.3rem;
        }
        .score span {
            color: #00ff88;
            font-weight: bold;
        }
        #gameCanvas {
            border: 4px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        .controls {
            margin-top: 20px;
            color: #aaa;
            font-size: 1rem;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }
        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: #1a1a2e;
            color: #00ff88;
            border: 2px solid #00ff88;
            border-radius: 10px;
            cursor: pointer;
        }
        .mobile-controls button:active {
            background: #00ff88;
            color: #1a1a2e;
        }
        .btn-row {
            display: flex;
            gap: 5px;
        }
        @media (max-width: 600px) {
            .controls { display: none; }
            .mobile-controls { display: flex; flex-direction: column; align-items: center; }
        }
        button.restart {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none;
        }
        button.restart:hover {
            background: #ff6b81;
        }
    </style>
</head>
<body>
    <h1>🐍 Ilon O'yini</h1>
    <div class="score-board">
        <div class="score">Ochko: <span id="score">0</span></div>
        <div class="score">Rekord: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">⬆️⬇️⬅️➡️ yoki W/A/S/D tugmalari bilan boshqaring</div>
    <div class="mobile-controls">
        <button onclick="changeDirection('up')">⬆️</button>
        <div class="btn-row">
            <button onclick="changeDirection('left')">⬅️</button>
            <button onclick="changeDirection('down')">⬇️</button>
            <button onclick="changeDirection('right')">➡️</button>
        </div>
    </div>
    <button class="restart" id="restartBtn" onclick="restartGame()">Qayta o'ynash</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 10, y: 10 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameOver = false;
        let gameSpeed = 100;
        let lastTime = 0;
        let accumulator = 0;

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 }
            ];
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            gameOver = false;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('restartBtn').style.display = 'none';
            placeFood();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(segment => {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff88';
            snake.forEach((segment, index) => {
                const opacity = 1 - (index / snake.length) * 0.5;
                ctx.fillStyle = `rgba(0, 255, 136, ${opacity})`;
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff4757';
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4757';
                ctx.font = 'bold 40px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText('O\'yin Tugadi!', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = 'white';
                ctx.font = '20px Segoe UI';
                ctx.fillText(`Ochko: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function update() {
            if (gameOver) return;

            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }
            } else {
                snake.pop();
            }
        }

        function endGame() {
            gameOver = true;
            document.getElementById('restartBtn').style.display = 'block';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            accumulator += deltaTime;

            if (accumulator >= gameSpeed) {
                update();
                draw();
                accumulator = 0;
            }
        }

        function changeDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    changeDirection('right');
                    break;
            }
        });

        function restartGame() {
            initGame();
        }

        initGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
